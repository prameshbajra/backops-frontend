<div class="dark:bg-gray-700 dark:text-white">
  <h3 class="my-3 sm:my-4 text-base sm:text-lg font-bold">Select the month and the year</h3>

  <div class="flex justify-center h-48 sm:h-52">
    <!-- Months List -->
    <ul class="flex-1 max-w-[12rem] text-sm text-gray-900 bg-white border border-gray-200 dark:bg-gray-700 dark:border-gray-600 dark:text-white overflow-y-auto">
      @for (month of months; track $index) {
      <li class="w-full px-3 sm:px-4 py-2.5 sm:py-2 cursor-pointer border-b border-gray-200 dark:border-gray-600"
        [ngClass]="{'bg-blue-500 text-white': selectedMonthIndex === $index, 'hover:bg-gray-100 dark:hover:bg-gray-600': selectedMonthIndex !== $index}"
        (click)="selectMonth($index)">
        {{ month }}
      </li>
      }
    </ul>

    <!-- Years List -->
    <ul class="flex-1 max-w-[12rem] text-sm text-gray-900 bg-white border border-gray-200 dark:bg-gray-700 dark:border-gray-600 dark:text-white overflow-y-auto">
      @for (year of years; track $index) {
      <li class="w-full px-3 sm:px-4 py-2.5 sm:py-2 cursor-pointer border-b border-gray-200 dark:border-gray-600"
        [ngClass]="{'bg-blue-500 text-white': selectedYear === year, 'hover:bg-gray-100 dark:hover:bg-gray-600': selectedYear !== year}"
        (click)="selectYear(year)">
        {{ year }}
      </li>
      }
    </ul>
  </div>

  <div class="flex justify-end my-4 sm:my-5">
    <button type="button" (click)="onClear()"
      class="text-gray-900 bg-gray-200 focus:ring-4 focus:ring-gray-300 font-medium rounded-lg text-sm px-4 sm:px-5 py-2.5 me-2 mb-2 dark:bg-gray-600 dark:text-white dark:hover:bg-gray-800 focus:outline-none dark:focus:ring-gray-800 min-h-[44px]">
      Clear
    </button>
    <button type="button" (click)="onApply()"
      class="text-white bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 sm:px-5 py-2.5 me-2 mb-2 dark:bg-blue-600 dark:hover:bg-blue-700 focus:outline-none dark:focus:ring-blue-800 min-h-[44px]">
      Apply
    </button>
  </div>
</div>
